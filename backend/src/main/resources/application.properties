# AI Interview Copilot — Spring Boot configuration
# Copy to application-local.properties for secrets, or use environment variables.

server.port=8080
spring.application.name=ai-interview-copilot

# PostgreSQL (default). For MySQL: change url + driver is on classpath.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/interview_copilot}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT — use a long random secret in production (256+ bits)
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-key-for-development-only-min-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Groq OpenAI-compatible API (optional: if empty, mock analysis is returned)
groq.api.key=${GROQ_API_KEY:}
groq.api.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.api.url=https://api.groq.com/openai/v1/chat/completions

# Multipart uploads (resume PDF)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
